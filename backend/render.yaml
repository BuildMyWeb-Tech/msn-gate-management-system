services:
  - type: web
    name: gms-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_SERVER
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_ENCRYPT
        value: "false"
      - key: DB_TRUST_CERT
        value: "true"
      - key: DB_CONNECTION_TIMEOUT
        value: "30000"
      - key: DB_REQUEST_TIMEOUT
        value: "30000"
      - key: DEFAULT_COMPANY_CODE
        value: "1"
      - key: PASS_PREFIX
        value: "PASS"
      - key: FRONTEND_URL
        sync: false
